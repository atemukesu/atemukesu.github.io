    <link href="https://cdn.staticfile.org/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563eb',
                        accent: '#0ea5e9',
                        dark: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .stagger-1 { transition-delay: 100ms; }
        .stagger-2 { transition-delay: 200ms; }
        .stagger-3 { transition-delay: 300ms; }
        .stagger-4 { transition-delay: 400ms; }
        .stagger-5 { transition-delay: 500ms; }

        .hero-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .hero-accent {
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.15);
        }

        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #2563eb;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .tool-card {
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 0;
            background: linear-gradient(180deg, #2563eb, #0ea5e9);
            transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tool-card:hover::before {
            height: 100%;
        }

        .gradient-text {
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tool-icon {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
        }

        .tool-tag {
            transition: all 0.3s;
        }

        .tool-tag:hover {
            background: #2563eb !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-white">

                    <a href="tools.html" class="nav-link text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition-colors" data-i18n="nav.tools">Tools</a>
                </div>
                <button id="lang-toggle" class="px-3 py-1 border border-slate-300 dark:border-slate-700 hover:bg-slate-900 hover:text-white dark:hover:bg-white dark:hover:text-slate-900 transition-all font-bold text-sm">EN</button>
                <button id="theme-toggle" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-900 transition-colors">
                    <i class="fas fa-moon dark:hidden text-slate-600"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>

    </nav>

    <section class="py-32 hero-bg flex items-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500 rounded-full filter blur-3xl" style="animation: floating 3s ease-in-out infinite;"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500 rounded-full filter blur-3xl" style="animation: floating 3s ease-in-out infinite; animation-delay: -1.5s;"></div>
        </div>
        <div class="container mx-auto px-6 relative z-10 text-center">
            <div class="reveal stagger-1">

            </div>
            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-none tracking-tight text-white reveal stagger-2">
                <span class="gradient-text">Useful</span> Tools
            </h1>
            <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto reveal stagger-3" data-i18n="tools.desc">
                Practical little tools I built for myself and others.

    <script src="./statics/script.js"></script>
    <script>
        function handleReveal() {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(el => {
                const windowHeight = window.innerHeight;
                const elementTop = el.getBoundingClientRect().top;
                const revealPoint = 100;
                if (elementTop < windowHeight - revealPoint) {
                    el.classList.add('active');
                }
            });
        }

        window.addEventListener('scroll', handleReveal);
        window.addEventListener('load', handleReveal);
    </script>
</body>

</html>
